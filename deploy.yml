name: Auto-Deploy Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'plugin/**'
      - '.github/workflows/deploy.yml'
      - 'VERSION'

jobs:
  version-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Ler versão atual
      - name: Read version file
        id: version
        run: |
          if [ -f VERSION ]; then
            CURRENT=$(cat VERSION)
          else
            CURRENT="0.1.0"
            echo "0.1.0" > VERSION
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      # 3. Determinar novo versionamento baseado em commits
      - name: Determine version bump
        id: bump
        run: |
          git log --oneline -1 --format=%B > /tmp/commit_msg.txt
          COMMIT_MSG=$(cat /tmp/commit_msg.txt)
          CURRENT=${{ steps.version.current }}

          # Parse versão atual
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Lógica de bump baseada no commit
          if echo "$COMMIT_MSG" | grep -qE "^feat!:|^BREAKING CHANGE:"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -q "^feat:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP_TYPE="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP_TYPE="patch"
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      # 4. Atualizar arquivo VERSION
      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION

      # 5. Commit e push da versão (evita loop infinito)
      - name: Commit and push version
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}" || echo "No changes to commit"
          git push origin main || echo "Push failed (might be normal if no changes)"

      # 6. Criar tag de versão
      - name: Create git tag
        run: |
          git tag -a v${{ steps.bump.outputs.new_version }} -m "Release v${{ steps.bump.outputs.new_version }}" || echo "Tag already exists"
          git push origin v${{ steps.bump.outputs.new_version }} || echo "Tag push failed"

      # 7. Empacotar plugin
      - name: Package plugin
        run: |
          cd plugin
          zip -r ../plugin-v${{ steps.bump.outputs.new_version }}.zip .
          cd ..
          ls -lah plugin-v*.zip

      # 8. Criar release no GitHub
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: Release v${{ steps.bump.outputs.new_version }}
          body: |
            # Plugin Update: v${{ steps.bump.outputs.new_version }}

            **Bump Type**: ${{ steps.bump.outputs.bump_type }}

            ## Changes
            Latest commit: ${{ github.event.head_commit.message }}

            ---

            **URL para Claude**:
            ```
            https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.new_version }}/plugin-v${{ steps.bump.outputs.new_version }}.zip
            ```

            Ou use sempre a versão `latest`:
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/plugin.zip
            ```
          draft: false
          prerelease: false
          files: |
            plugin-v${{ steps.bump.outputs.new_version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Notificação de sucesso (opcional: webhook)
      - name: Notify deployment (optional)
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d '{
              "event": "plugin_deployed",
              "version": "${{ steps.bump.outputs.new_version }}",
              "repository": "${{ github.repository }}",
              "commit": "${{ github.sha }}",
              "download_url": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump.outputs.new_version }}/plugin-v${{ steps.bump.outputs.new_version }}.zip"
            }'
        continue-on-error: true

  # Job complementar: validar estrutura do plugin
  validate-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check plugin.json syntax
        run: |
          if [ -f plugin/plugin.json ]; then
            python3 -m json.tool plugin/plugin.json > /dev/null && echo "✓ plugin.json válido"
          else
            echo "✗ plugin.json não encontrado em plugin/"
            exit 1
          fi

      - name: Check required files
        run: |
          REQUIRED_FILES=("plugin/plugin.json")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "✗ Arquivo obrigatório não encontrado: $file"
              exit 1
            fi
          done
          echo "✓ Todos os arquivos obrigatórios presentes"
