name: Auto-Deploy Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'plugin/**'
      - '.github/workflows/deploy.yml'
      - 'VERSION'

jobs:
  version-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version file
        id: version
        run: |
          if [ -f VERSION ]; then
            CURRENT=$(cat VERSION)
          else
            CURRENT="0.1.0"
            echo "0.1.0" > VERSION
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          git log --oneline -1 --format=%B > /tmp/commit_msg.txt
          COMMIT_MSG=$(cat /tmp/commit_msg.txt)
          CURRENT=${{ steps.version.outputs.current }}
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          if echo "$COMMIT_MSG" | grep -qE "^feat!:|^BREAKING CHANGE:"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -q "^feat:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP_TYPE="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP_TYPE="patch"
          fi
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION

      - name: Commit and push version
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}" || true
          git push origin main || true

      - name: Create git tag
        run: |
          git tag -a v${{ steps.bump.outputs.new_version }} -m "Release v${{ steps.bump.outputs.new_version }}" || true
          git push origin v${{ steps.bump.outputs.new_version }} || true

      - name: Package plugin
        run: |
          cd plugin
          zip -r ../plugin-v${{ steps.bump.outputs.new_version }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: Release v${{ steps.bump.outputs.new_version }}
          body: |
            # Plugin Update: v${{ steps.bump.outputs.new_version }}
            **Bump Type**: ${{ steps.bump.outputs.bump_type }}
            Download: plugin-v${{ steps.bump.outputs.new_version }}.zip
          draft: false
          prerelease: false
          files: |
            plugin-v${{ steps.bump.outputs.new_version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check plugin.json syntax
        run: |
          if [ -f plugin/plugin.json ]; then
            python3 -m json.tool plugin/plugin.json > /dev/null && echo "✓ plugin.json válido"
          else
            echo "✗ plugin.json não encontrado"
            exit 1
          fi
